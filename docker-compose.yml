services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vkusno
      POSTGRES_USER: vkusno
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkusno -d vkusno"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./media:/app/media
      - .:/app
    ports:
      - "8000:8000"

  worker:
    build: .
    restart: unless-stopped
    command: python -m app.worker
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app

  # ПРИМЕЧАНИЕ: dev работает напрямую по :8000 (http://v2.vkusnotomsk.ru:8000),
  # без nginx. Прод-стек (nginx :80/:443 + SSL) — в docker-compose.prod.yml,
  # запускается отдельным проектом (-p vkusno_prod). Так dev и prod не конфликтуют.

volumes:
  pgdata:
